# ==============================================================================
# Load Tests (Staging Only)
# ==============================================================================
# Runs 10 critical user journeys as k6 load tests in parallel CI matrix.
# Scheduled: weekly (Mon 06:00 UTC) + manual dispatch via workflow_dispatch.
#
# ⚠️  SAFETY: This workflow targets a STAGING environment ONLY.
#    - Migrations are applied to the staging database
#    - Seed data is inserted into the staging database
#    - All secrets use STAGING_* prefix to prevent accidental prod access
#
# Each journey runs in its own `grafana/k6` container. Browser journeys
# (home, explore, search-address, explore-geo) use k6 browser with embedded
# Chromium. HTTP journeys (login, create-review, review-detail, vote-review,
# create-property-review, auth-callback) use k6 HTTP only.
#
# Threshold breaches cause non-zero exit → GitHub check fails.
# Reports are uploaded as artifacts for every run.
# ==============================================================================

name: Load Tests

on:
  schedule:
    - cron: '0 6 * * 1' # Monday 06:00 UTC
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Target BASE_URL for load tests'
        required: true
        default: 'https://staging.reviuy.app'
      review_action_hash:
        description: 'Next.js Server Action hash for create-review (optional)'
        required: false
        default: ''

# Avoid duplicate runs on the same ref
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Seed check: ensures migrations + seed data are applied on staging
  # ---------------------------------------------------------------------------
  seed-check:
    name: Seed Check (Staging)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client

      - name: Apply cleanup RPC function
        run: psql -h "$PGHOST" -U "$PGUSER" -d "$PGDATABASE" -f supabase/migrations/016_load_test_seed.sql
        env:
          PGHOST: aws-1-us-east-1.pooler.supabase.com
          PGUSER: postgres.nanksrdsnybkkrmfrnjp
          PGPORT: "5432"
          PGDATABASE: postgres
          PGPASSWORD: ${{ secrets.STAGING_SUPABASE_DB_PASSWORD }}
        # Idempotent: create or replace function cleanup_test_data()

      - name: Apply seed data (test users, properties, reviews)
        run: |
          # 1. Clean up any leftover data from previous runs
          psql -h "$PGHOST" -U "$PGUSER" -d "$PGDATABASE" \
            -c "select public.cleanup_test_data();"

          # 2. pgcrypto extension
          psql -h "$PGHOST" -U "$PGUSER" -d "$PGDATABASE" \
            -c "create extension if not exists pgcrypto with schema extensions;"

          # 3. Load test users (20) — via Auth Admin API
          node -e '
          const { createClient } = require("@supabase/supabase-js");
          const sb = createClient(
            process.env.SUPABASE_URL,
            process.env.SUPABASE_SERVICE_KEY
          );
          (async () => {
            for (let i = 0; i < 20; i++) {
              const { error } = await sb.auth.admin.createUser({
                email: "loadtest-" + i + "@reviuy.qa",
                password: process.env.TEST_PASSWORD,
                email_confirm: true,
                user_metadata: { is_load_test_user: true }
              });
              if (error && !error.message.includes("already been registered")) {
                console.error("Failed:", "loadtest-" + i + "@reviuy.qa", error.message);
                process.exit(1);
              }
            }
            console.log("20 load test users created/verified");
          })();
          '
        env:
          PGHOST: aws-1-us-east-1.pooler.supabase.com
          PGUSER: postgres.nanksrdsnybkkrmfrnjp
          PGPORT: "5432"
          PGDATABASE: postgres
          PGPASSWORD: ${{ secrets.STAGING_SUPABASE_DB_PASSWORD }}
          SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.STAGING_SUPABASE_SERVICE_KEY }}
          TEST_PASSWORD: ${{ secrets.STAGING_TEST_PASSWORD }}

      # Remaining inserts are single statements — use --file with heredocs.
      - name: Seed real estates (50)
        run: |
          cat <<'SQLEOF' | tee /tmp/seed_real_estates.sql
          insert into public.real_estates (name, description, created_by)
          select
            'Test Property ' || n,
            'Load test property for performance testing — #' || n,
            (select id from auth.users where email = 'loadtest-0@reviuy.qa')
          from generate_series(1, 50) n
          where not exists (
            select 1 from public.real_estates where name = 'Test Property ' || n
          );
          SQLEOF
          psql -h "$PGHOST" -U "$PGUSER" -d "$PGDATABASE" --file /tmp/seed_real_estates.sql
        env:
          PGUSER: postgres.nanksrdsnybkkrmfrnjp
          PGHOST: aws-1-us-east-1.pooler.supabase.com
          PGPORT: "5432"
          PGDATABASE: postgres
          PGPASSWORD: ${{ secrets.STAGING_SUPABASE_DB_PASSWORD }}

      - name: Seed reviews (200)
        run: |
          cat <<'SQLEOF' | tee /tmp/seed_reviews.sql
          insert into public.reviews (
            user_id, real_estate_id, title, description, rating,
            property_type, address_text, address_osm_id,
            latitude, longitude, zone_rating,
            winter_comfort, summer_comfort, humidity
          )
          select
            u.id, re.id,
            'Load Test Review #' || n,
            'This is an automated load test review number ' || n || ' for performance testing purposes. It contains enough text to meet the minimum length requirement.',
            3 + (n % 3),
            case when n % 3 = 0 then 'apartment' when n % 3 = 1 then 'house' else 'room' end,
            '123 Load Test Street, Montevideo',
            'lt-osm-' || n,
            (-34.9035 + n * 0.001)::decimal(10, 8),
            (-56.1660 + n * 0.001)::decimal(11, 8),
            3 + (n % 3),
            case when n % 2 = 0 then 'comfortable' else 'cold' end,
            case when n % 2 = 0 then 'comfortable' else 'hot' end,
            case when n % 3 = 0 then 'normal' when n % 3 = 1 then 'high' else 'low' end
          from generate_series(1, 200) n
          join auth.users u on u.email = 'loadtest-' || ((n - 1) % 20) || '@reviuy.qa'
          join public.real_estates re on re.name = 'Test Property ' || (1 + ((n - 1) % 50))
          on conflict (id) do nothing;
          SQLEOF
          psql -h "$PGHOST" -U "$PGUSER" -d "$PGDATABASE" --file /tmp/seed_reviews.sql
        env:
          PGUSER: postgres.nanksrdsnybkkrmfrnjp
          PGHOST: aws-1-us-east-1.pooler.supabase.com
          PGPORT: "5432"
          PGDATABASE: postgres
          PGPASSWORD: ${{ secrets.STAGING_SUPABASE_DB_PASSWORD }}

      - name: Seed review rooms (50)
        run: |
          cat <<'SQLEOF' | tee /tmp/seed_rooms.sql
          insert into public.review_rooms (review_id, room_type, area_m2)
          select
            r.id,
            case when n % 2 = 0 then 'bedroom' else 'living_room' end,
            15 + (n % 10)::numeric(7, 2)
          from (
            select r.id, row_number() over (order by r.created_at) as rn
            from public.reviews r
            where r.user_id in (select id from auth.users where email like 'loadtest-%@reviuy.qa')
          ) r
          cross join generate_series(1, 200) n
          where r.rn = n and n % 4 = 0
          on conflict (id) do nothing;
          SQLEOF
          psql -h "$PGHOST" -U "$PGUSER" -d "$PGDATABASE" --file /tmp/seed_rooms.sql
        env:
          PGUSER: postgres.nanksrdsnybkkrmfrnjp
          PGHOST: aws-1-us-east-1.pooler.supabase.com
          PGPORT: "5432"
          PGDATABASE: postgres
          PGPASSWORD: ${{ secrets.STAGING_SUPABASE_DB_PASSWORD }}
        # Idempotent — safe to re-run. Uses ON CONFLICT DO NOTHING.

  # ---------------------------------------------------------------------------
  # Load test matrix: one job per journey
  # ---------------------------------------------------------------------------
  load-test:
    name: Journey — ${{ matrix.journey }}
    needs: [seed-check]
    runs-on: ubuntu-latest
    timeout-minutes: 12
    environment: staging

    strategy:
      fail-fast: false # Let all journeys complete even if one fails
      matrix:
        journey:
          - home
          - explore
          - login
          - create-review
          - review-detail
          - vote-review
          - search-address
          - explore-geo
          - create-property-review
          - auth-callback

    steps:
      - uses: actions/checkout@v4

      - name: Run k6 load test (${{ matrix.journey }})
        run: |
          mkdir -p k6/reports/${{ matrix.journey }}

          docker run --rm \
            --user root \
            --cap-add=SYS_ADMIN \
            -v ${{ github.workspace }}:/apps \
            -w /apps \
            -e K6_BROWSER_HEADLESS=true \
            -e BASE_URL="$BASE_URL" \
            -e SUPABASE_URL="$SUPABASE_URL" \
            -e SUPABASE_SERVICE_KEY="$SUPABASE_SERVICE_KEY" \
            -e TEST_PASSWORD="$TEST_PASSWORD" \
            -e REVIEW_ACTION_HASH="$REVIEW_ACTION_HASH" \
            grafana/k6:latest-with-browser \
            run \
              --compatibility-mode=extended \
              -e BASE_URL="$BASE_URL" \
              -e SUPABASE_URL="$SUPABASE_URL" \
              -e SUPABASE_SERVICE_KEY="$SUPABASE_SERVICE_KEY" \
              -e TEST_PASSWORD="$TEST_PASSWORD" \
              -e REVIEW_ACTION_HASH="$REVIEW_ACTION_HASH" \
              --out json=k6/reports/${{ matrix.journey }}/metrics.json \
              --summary-export=k6/reports/${{ matrix.journey }}/summary.json \
              k6/journeys/${{ matrix.journey }}.js
        env:
          K6_BROWSER_HEADLESS: true
          BASE_URL: ${{ github.event.inputs.base_url || vars.STAGING_BASE_URL || secrets.STAGING_BASE_URL }}
          SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.STAGING_SUPABASE_SERVICE_KEY }}
          TEST_PASSWORD: ${{ secrets.STAGING_TEST_PASSWORD }}
          REVIEW_ACTION_HASH: ${{ github.event.inputs.review_action_hash || secrets.STAGING_REVIEW_ACTION_HASH || '' }}

      - name: Upload report artifact
        if: always() # Upload even on failure for debugging
        uses: actions/upload-artifact@v4
        with:
          name: report-${{ matrix.journey }}
          path: k6/reports/${{ matrix.journey }}/
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Cleanup: remove test data after all journeys (pass or fail)
  # ---------------------------------------------------------------------------
  cleanup:
    name: Cleanup Test Data
    needs: [load-test]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: staging

    steps:
      - name: Install PostgreSQL client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client

      - name: Cleanup test data
        run: psql -h "$PGHOST" -U "$PGUSER" -d "$PGDATABASE" -c "select public.cleanup_test_data();"
        env:
          PGHOST: aws-1-us-east-1.pooler.supabase.com
          PGUSER: postgres.nanksrdsnybkkrmfrnjp
          PGPORT: "5432"
          PGDATABASE: postgres
          PGPASSWORD: ${{ secrets.STAGING_SUPABASE_DB_PASSWORD }}

  # ---------------------------------------------------------------------------
  # Notification on failure
  # ---------------------------------------------------------------------------
  notify:
    name: Notify on threshold breach
    needs: [load-test]
    if: failure() && github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Log threshold breach
        env:
          GH_SERVER_URL: ${{ github.server_url }}
          GH_REPOSITORY: ${{ github.repository }}
          GH_RUN_ID: ${{ github.run_id }}
        run: |
          echo "::warning::⚠️ Load test threshold breach detected — $(date)"
          echo "Check artifacts at: $GH_SERVER_URL/$GH_REPOSITORY/actions/runs/$GH_RUN_ID"

      # Add Slack/email notification here when integration is configured.
      # - uses: slackapi/slack-github-action@...
      #   with:
      #     webhook: ${{ secrets.SLACK_WEBHOOK }}
