name: Security OWASP

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  semgrep:
    name: Semgrep OWASP SAST
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Semgrep (OWASP + JS/TS + Secrets)
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/owasp-top-ten
            p/javascript
            p/typescript
            p/secrets

  dependency-audit:
    name: Dependency Audit (CVE)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Run dependency audit
        run: yarn security:deps

  zap-baseline:
    name: OWASP ZAP Baseline (staging)
    runs-on: ubuntu-latest
    if: ${{ vars.ZAP_TARGET_URL != '' }}
    steps:
      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: ${{ vars.ZAP_TARGET_URL }}
          fail_action: true
          cmd_options: >-
            -a
            -m 5
