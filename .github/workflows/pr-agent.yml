name: Autodocumentar PR con Gemini
on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  pull-requests: write
  contents: write
  issues: write

jobs:
  pr-agent:
    runs-on: ubuntu-latest
    # Solo corre si la PR no es un borrador
    if: github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run PR Agent
        uses: Codium-ai/pr-agent@main
        env:
          # Autenticación
          GOOGLE_AI_STUDIO_KEY: ${{ secrets.GOOGLE_AI_STUDIO_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          # Configuración del Modelo (Gemini 1.5 Flash es gratuito y rápido)
          CONFIG.MODEL: 'gemini/gemini-1.5-flash'
          PR_AGENT.MODEL: 'gemini/gemini-1.5-flash'

          # Comandos automáticos al crear o actualizar la PR
          GITHUB_ACTION_CONFIG.AUTO_DESCRIBE: 'true'
          GITHUB_ACTION_CONFIG.AUTO_REVIEW: 'true'

          # Personalización de la Documentación
          PR_DESCRIPTION.PUBLISH_DESCRIPTION_AS_COMMENT: 'false' # Edita la descripción principal
          PR_DESCRIPTION.EXTRA_INSTRUCTIONS: 'Responde siempre en español. Sé conciso, técnico y estructurado.'

          # Forzar actualización en cada push (synchronize)
          PR_DESCRIPTION.REGENERATE_DESCRIPTION: 'true'
