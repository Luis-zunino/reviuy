name: Autodocumentar PR con Gemini
on:
  pull_request:
    types: [opened, reopened, ready_for_review]

permissions:
  pull-requests: write
  contents: write
  issues: write

jobs:
  pr-agent:
    runs-on: ubuntu-latest
    # Solo corre si la PR no es un borrador
    if: github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate secrets
        run: |
          if [ -z "${{ secrets.GOOGLE_AI_STUDIO_KEY }}" ]; then
            echo "❌ Error: GOOGLE_AI_STUDIO_KEY no está configurado"
            exit 1
          fi
          echo "✅ Secretos configurados correctamente"

      - name: Run PR Agent
        uses: Codium-ai/pr-agent@main
        env:
          # Autenticación (CRÍTICO: el secret debe pasar correctamente)
          OPENAI_KEY: 'sk-null' # Fallback que será ignorado si Gemini funciona
          GOOGLE_AI_STUDIO_KEY: ${{ secrets.GOOGLE_AI_STUDIO_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          # Configuración del Modelo (Gemini 1.5 Flash - formato correcto con __)
          CONFIG__MODEL: 'gemini/gemini-1.5-flash'
          PR_AGENT__MODEL: 'gemini/gemini-1.5-flash'

          # Comandos automáticos al crear o actualizar la PR
          GITHUB_ACTION_CONFIG__AUTO_DESCRIBE: 'true'
          GITHUB_ACTION_CONFIG__AUTO_REVIEW: 'true'
          GITHUB_ACTION_CONFIG__ENABLE_FOR_DRAFT: 'false'

          # IMPORTANTE: Permitir que procese eventos de "synchronize" (pushes a PRs)
          PR_REVIEWER__ENABLE_INCREMENTAL_REVIEW: 'true'

          # Personalización de la Documentación
          PR_DESCRIPTION__PUBLISH_DESCRIPTION_AS_COMMENT: 'false'
          PR_DESCRIPTION__EXTRA_INSTRUCTIONS: 'Responde siempre en español. Sé conciso, técnico y estructurado.'
          PR_DESCRIPTION__REGENERATE_DESCRIPTION: 'true'

          # Desabilitar fallback a OpenAI para evitar "dummy_key"
          PR_DESCRIPTION__MAX_AI_CALLS: '1'
