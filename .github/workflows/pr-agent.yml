name: Autodocumentar PR con Gemini
on:
  pull_request:
    # 'opened' se activa al crear la PR
    # 'synchronize' se activa cada vez que haces un push a la rama de la PR
    types: [opened, synchronize, ready_for_review]

permissions:
  pull-requests: write
  contents: write

jobs:
  pr-agent:
    runs-on: ubuntu-latest
    # Evitamos que corra en PRs que todavía son borradores (drafts) para ahorrar recursos
    if: github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run PR Agent
        uses: Codium-ai/pr-agent@main
        env:
          GOOGLE_AI_STUDIO_KEY: ${{ secrets.GOOGLE_AI_STUDIO_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          # Configuración del motor gratuito
          CONFIG.MODEL: 'gemini/gemini-1.5-flash'

          # Acciones automáticas
          GITHUB_ACTION_CONFIG.AUTO_DESCRIBE: 'true' # Genera la descripción del PR
          GITHUB_ACTION_CONFIG.AUTO_REVIEW: 'true' # Hace una revisión rápida del código

          # Personalización de la descripción
          PR_DESCRIPTION.PUBLISH_DESCRIPTION_AS_COMMENT: 'false' # Para que edite la descripción principal en vez de crear un comentario
          PR_DESCRIPTION.EXTRA_INSTRUCTIONS: 'Resume los cambios de forma clara y técnica en español.'
