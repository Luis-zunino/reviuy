name: Autodocumentar PR con Gemini

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]

permissions:
  pull-requests: write
  contents: write
  issues: write

jobs:
  pr-agent:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'pull_request' && github.event.pull_request.draft == false ||
      github.event_name == 'issue_comment' && github.event.issue.pull_request &&
      startsWith(github.event.comment.body, '/describe')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate secrets
        run: |
          if [ -z "${{ secrets.GOOGLE_AI_STUDIO_KEY }}" ]; then
            echo "❌ Error: GOOGLE_AI_STUDIO_KEY no está configurado"
            exit 1
          fi
          echo "✅ Secretos configurados correctamente"

      - name: Run PR Agent
        uses: the-pr-agent/pr-agent@main
        env:
          GOOGLE_AI_STUDIO_KEY: ${{ secrets.GOOGLE_AI_STUDIO_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          CONFIG__MODEL: 'gemini/gemini-1.5-flash'
          PR_AGENT__MODEL: 'gemini/gemini-1.5-flash'

          GITHUB_ACTION__AUTO_DESCRIBE: 'true'
          GITHUB_ACTION__AUTO_REVIEW: 'true'
          GITHUB_ACTION__ENABLE_FOR_DRAFT: 'false'

          PR_DESCRIPTION__PUBLISH_DESCRIPTION_AS_COMMENT: 'false'
          PR_DESCRIPTION__EXTRA_INSTRUCTIONS: 'Responde siempre en español. Sé conciso, técnico y estructurado.'
          PR_DESCRIPTION__REGENERATE_DESCRIPTION: 'true'
          PR_DESCRIPTION__MAX_AI_CALLS: '2'

          PR_REVIEWER__ENABLE_INCREMENTAL_REVIEW: 'true'
