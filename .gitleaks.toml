# Gitleaks configuration for the repo
# see https://github.com/gitleaks/gitleaks/blob/main/CONFIGURATION.md for options

[[rules]]
  description = "Generic credential patterns"
  regex = '''(?i)(?:apikey|api_key|secret|token|password|passwd|pwd)["'\s:=]+[0-9a-zA-Z]{8,}'''
  tags = ["key", "password"]

# add more rules or exceptions as needed
